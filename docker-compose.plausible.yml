version: '3.8'

# Plausible Analytics CE overlay
#
# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.elk.yml -f docker-compose.plausible.yml up -d
#
# First-run setup (one time only):
#   1. Open http://localhost:8001 and register an admin account
#   2. Add a new site — set domain to: localhost
#   3. Skip the script snippet step (already injected by the frontend)
#   4. In Goals, add Custom Event goals for each event name in docs/PLAUSIBLE.md
#
# Dashboard: http://localhost:8001

services:
  # Dedicated PostgreSQL for Plausible metadata (users, sites, goals)
  plausible_db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: plausible
      POSTGRES_PASSWORD: plausible
      POSTGRES_DB: plausible
    volumes:
      - plausible_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plausible"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices

  # ClickHouse — stores all page view and custom event data
  plausible_events_db:
    image: clickhouse/clickhouse-server:24.3.3.102-alpine
    restart: unless-stopped
    volumes:
      - plausible_events_data:/var/lib/clickhouse
      - ./observability/plausible/clickhouse-config.xml:/etc/clickhouse-server/config.d/logging.xml:ro
      - ./observability/plausible/clickhouse-ipv4.xml:/etc/clickhouse-server/config.d/ipv4.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - microservices

  # Plausible Community Edition
  plausible:
    image: ghcr.io/plausible/community-edition:v2.1
    restart: on-failure
    command: sh -c "/entrypoint.sh db createdb && /entrypoint.sh db migrate && /entrypoint.sh run"
    ports:
      - "8001:8000"
    environment:
      BASE_URL: http://localhost:8001
      # Generate your own: openssl rand -base64 48
      SECRET_KEY_BASE: "Ue6vBRfKJ5y2cAqLNdXmWhPsToZrGi0FeDjMnVkIbOgEaHwlCp3sQu7xY4tNmRz8VbJsKpQa1cDeF"
      DATABASE_URL: postgres://plausible:plausible@plausible_db:5432/plausible
      CLICKHOUSE_DATABASE_URL: http://plausible_events_db:8123/plausible
      # Use local mailer so no SMTP config is needed for self-hosting
      MAILER_ADAPTER: Bamboo.LocalAdapter
    depends_on:
      plausible_db:
        condition: service_healthy
      plausible_events_db:
        condition: service_healthy
    networks:
      - microservices

  # Inject Plausible tracker config into the frontend
  frontend:
    environment:
      # URL the *browser* uses to reach Plausible (must be reachable from user's machine)
      PLAUSIBLE_URL: http://localhost:8001
      # Must match the domain registered in the Plausible dashboard
      PLAUSIBLE_DOMAIN: localhost

volumes:
  plausible_postgres_data:
  plausible_events_data:
