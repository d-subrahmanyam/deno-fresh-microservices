apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# To deploy a specific build:
#   kustomize edit set image microservices/cart-service=your-registry/microservices/cart-service:git-<sha>
#   kubectl apply -k kubernetes/overlays/staging/services/cart-service
resources:
  - ../../../../base/services/cart-service
images:
  - name: microservices/cart-service
    newTag: git-replace-me
