apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Production deployment - requires approval.
# Update newTag to an immutable image SHA before applying.
# Record: image tag, approver, rollback target in the release ticket.
# To deploy:
#   kustomize edit set image microservices/frontend=your-registry/microservices/frontend:git-<sha>
#   kubectl apply -k kubernetes/overlays/production/services/frontend
resources:
  - ../../../../base/services/frontend
images:
  - name: microservices/frontend
    newTag: git-replace-me
