apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Production deployment - requires approval.
# Update newTag to an immutable image SHA before applying.
# Record: image tag, approver, rollback target in the release ticket.
# To deploy:
#   kustomize edit set image microservices/products-service=your-registry/microservices/products-service:git-<sha>
#   kubectl apply -k kubernetes/overlays/production/services/products-service
resources:
  - ../../../../base/services/products-service
images:
  - name: microservices/products-service
    newTag: git-replace-me
