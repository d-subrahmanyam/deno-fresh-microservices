apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Production deployment - requires approval.
# Update newTag to an immutable image SHA before applying.
# Record: image tag, approver, rollback target in the release ticket.
# To deploy:
#   kustomize edit set image microservices/api-gateway=your-registry/microservices/api-gateway:git-<sha>
#   kubectl apply -k kubernetes/overlays/production/services/api-gateway
resources:
  - ../../../../base/services/api-gateway
images:
  - name: microservices/api-gateway
    newTag: git-replace-me
