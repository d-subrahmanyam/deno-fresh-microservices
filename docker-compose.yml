version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices

  # Redis for message passing and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      PRODUCTS_SERVICE_URL: http://products-service:3003
      ORDERS_SERVICE_URL: http://orders-service:3004
      CART_SERVICE_URL: http://cart-service:3005
    depends_on:
      - products-service
      - orders-service
      - cart-service
    networks:
      - microservices

  # Products Service
  products-service:
    build:
      context: .
      dockerfile: ./services/products-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      PORT: "3003"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: products
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microservices

  # Orders Service
  orders-service:
    build:
      context: .
      dockerfile: ./services/orders-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      PORT: "3004"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: orders
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - microservices

  # Cart Service
  cart-service:
    build:
      context: .
      dockerfile: ./services/cart-service/Dockerfile
    ports:
      - "3005:3005"
    environment:
      PORT: "3005"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - microservices

  # Fresh Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      API_URL: http://api-gateway:3000
    depends_on:
      - api-gateway
    networks:
      - microservices

volumes:
  postgres_data:

networks:
  microservices:
    driver: bridge
