version: '3.8'

services:
  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices

  # Redis for message passing and caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices

  # Payment Processor Service (internal mock — not exposed beyond the microservices network)
  payment-processor:
    build:
      context: .
      dockerfile: ./services/payment-processor/Dockerfile
    ports:
      - "3002:3002"
    environment:
      PORT: "3002"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: payment_processor
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "payment-processor"
    networks:
      - microservices

  # Payment Gateway Service (pluggable provider facade)
  payment-gateway:
    build:
      context: .
      dockerfile: ./services/payment-gateway/Dockerfile
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: payments
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      PAYMENT_PROCESSOR_URL: http://payment-processor:3002
      ORDERS_SERVICE_URL: http://orders-service:3004
      PAYMENT_PROVIDER: mock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      payment-processor:
        condition: service_started
      orders-service:
        condition: service_started
    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "payment-gateway"
    networks:
      - microservices

  # Analytics Service
  analytics-service:
    build:
      context: .
      dockerfile: ./services/analytics-service/Dockerfile
    ports:
      - "3006:3006"
    environment:
      PORT: "3006"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: analytics
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "analytics-service"
    networks:
      - microservices

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: ./services/api-gateway/Dockerfile
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      PRODUCTS_SERVICE_URL: http://products-service:3003
      ORDERS_SERVICE_URL: http://orders-service:3004
      CART_SERVICE_URL: http://cart-service:3005
      PAYMENT_GATEWAY_SERVICE_URL: http://payment-gateway:3001
      ANALYTICS_SERVICE_URL: http://analytics-service:3006
    depends_on:
      - products-service
      - orders-service
      - cart-service
      - payment-gateway
      - analytics-service
    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "api-gateway"
    networks:
      - microservices

  # Products Service
  products-service:
    build:
      context: .
      dockerfile: ./services/products-service/Dockerfile
    ports:
      - "3003:3003"
    environment:
      PORT: "3003"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: products
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "products-service"
    networks:
      - microservices

  # Orders Service
  orders-service:
    build:
      context: .
      dockerfile: ./services/orders-service/Dockerfile
    ports:
      - "3004:3004"
    environment:
      PORT: "3004"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: orders
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "orders-service"
    networks:
      - microservices

  # Cart Service
  cart-service:
    build:
      context: .
      dockerfile: ./services/cart-service/Dockerfile
    ports:
      - "3005:3005"
    environment:
      PORT: "3005"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "cart-service"
    networks:
      - microservices

  # Storage Service — local mock S3 for dev; swap STORAGE_PROVIDER for S3/Azure in higher envs.
  # Port 3007 is NOT exposed on the host: all browser traffic is proxied through the
  # Fresh frontend (/api/upload for writes, /api/storage/files/:key for reads).
  # STORAGE_API_KEY guards write endpoints against other containers on the Docker network.
  storage-service:
    build:
      context: .
      dockerfile: ./services/storage-service/Dockerfile
    environment:
      PORT: "3007"
      STORAGE_PROVIDER: local
      STORAGE_PUBLIC_URL: http://localhost:8000/api/storage
      STORAGE_PATH: /app/uploads
      MAX_FILE_SIZE_MB: "5"
      ALLOWED_TYPES: "image/jpeg,image/png,image/webp,image/gif,image/svg+xml"
      STORAGE_API_KEY: "shophub-storage-dev-key"
    volumes:
      - storage_data:/app/uploads
    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "storage-service"
    networks:
      - microservices

  # Fresh Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      API_URL: http://api-gateway:3000
      STORAGE_SERVICE_URL: http://storage-service:3007
      STORAGE_API_KEY: "shophub-storage-dev-key"
    depends_on:
      - api-gateway
      - storage-service
    logging:
      driver: gelf
      options:
        gelf-address: "udp://localhost:12201"
        tag: "frontend"
    networks:
      - microservices

volumes:
  postgres_data:
  storage_data:

networks:
  microservices:
    driver: bridge
