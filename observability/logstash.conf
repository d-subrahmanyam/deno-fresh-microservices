input {
  # GELF input: receives logs from Docker's gelf logging driver
  gelf {
    port => 12201
    type => "docker"
  }
}

filter {
  # Parse structured JSON service logs (the message field contains the JSON line)
  if [message] =~ /^\s*\{/ {
    json {
      source => "message"
      target => "parsed"
    }

    if "_jsonparsefailure" not in [tags] {
      mutate {
        rename => {
          "[parsed][timestamp]"  => "timestamp"
          "[parsed][service]"    => "service"
          "[parsed][traceId]"    => "traceId"
          "[parsed][level]"      => "level"
          "[parsed][method]"     => "method"
          "[parsed][url]"        => "url"
          "[parsed][status]"     => "status"
          "[parsed][durationMs]" => "durationMs"
          "[parsed][event]"      => "event"
          "[parsed][eventType]"  => "eventType"
          "[parsed][orderId]"    => "orderId"
          "[parsed][userId]"     => "userId"
          "[parsed][paymentId]"  => "paymentId"
          "[parsed][amount]"     => "amount"
          "[parsed][provider]"   => "provider"
          "[parsed][error]"      => "errorMessage"
          "[parsed][page]"       => "page"
          "[parsed][sessionId]"  => "sessionId"
          "[parsed][properties]" => "properties"
        }
        remove_field => ["parsed", "message"]
      }
    }
  }

  # Use the service's own timestamp as @timestamp when present
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }

  # Promote Docker container_name → service if not already set by JSON
  if ![service] and [container_name] {
    mutate { copy => { "container_name" => "service" } }
  }

  # Numeric type coercions for Kibana aggregations
  if [durationMs] { mutate { convert => { "durationMs" => "integer" } } }
  if [status]     { mutate { convert => { "status"     => "integer" } } }
  if [amount]     { mutate { convert => { "amount"     => "float"   } } }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "shophub-%{+YYYY.MM.dd}"
  }
}
