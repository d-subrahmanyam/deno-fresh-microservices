filebeat.autodiscover:
  providers:
    - type: docker
      host: "unix:///run/user/1000/docker.sock"
      templates:
        - config:
            - type: docker
              containers.ids:
                - "${data.docker.container.id}"
              processors:
                - decode_json_fields:
                    fields: ["message"]
                    target: ""
                    overwrite_keys: true

processors:
  - add_docker_metadata:
      host: "unix:///run/user/1000/docker.sock"
  - drop_fields:
      fields: ["agent", "ecs", "host", "input"]
      ignore_missing: true

output.logstash:
  hosts: ["logstash:5044"]

logging.level: info
logging.to_stderr: true
